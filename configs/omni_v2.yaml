# fairseq2 asset cards. Point FAIRSEQ2_ASSET_DIR at this directory.
#
# The base model and tokenizer download automatically from Meta's public URLs
# (fully reproducible). The dataset and fine-tuned-checkpoint entries use LOCAL
# paths — edit the two lines marked "EDIT:" to match your machine.

name: omniASR_tokenizer_written_v2
tokenizer_family: char_tokenizer
tokenizer: https://dl.fbaipublicfiles.com/mms/omniASR_tokenizer_written_v2.model

---

name: omniASR_CTC_1B_v2
model_family: wav2vec2_asr
model_arch: 1b
model_config:
  target_vocab_size: 10288
checkpoint: https://dl.fbaipublicfiles.com/mms/omniASR-CTC-1B-v2.pt
tokenizer_ref: omniASR_tokenizer_written_v2

---

name: afrivoices
dataset_family: mixture_parquet_asr_dataset
dataset_config:
  # EDIT: path to your assembled training mix (see code/prep_shard.py + TRAINING.md)
  data: ./data/mix/version=0
tokenizer_ref: omniASR_tokenizer_written_v2

---

name: runb_12750
model_family: wav2vec2_asr
model_arch: 1b
model_config:
  target_vocab_size: 10288
  # EDIT: download from https://huggingface.co/Kimyayd/afrivoices-edge-asr (checkpoint_step12750/)
checkpoint: "file://./checkpoint_step12750/model/pp_00/tp_00/sdp_00.pt"
tokenizer_ref: omniASR_tokenizer_written_v2
